<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f6f9; color: #333; }
        .wrapper { max-width: 600px; margin: 40px auto; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .header { background: linear-gradient(135deg, #1A3C8F 0%, #E63329 100%); padding: 32px 40px; text-align: center; }
        .header img { height: 40px; margin-bottom: 12px; }
        .header h1 { color: #ffffff; font-size: 22px; font-weight: 600; letter-spacing: 0.5px; }
        .header p { color: rgba(255,255,255,0.85); font-size: 13px; margin-top: 4px; }
        .body { padding: 40px; }
        .body h2 { font-size: 20px; color: #1A3C8F; margin-bottom: 16px; }
        .body p { font-size: 15px; line-height: 1.7; color: #555; margin-bottom: 16px; }
        .btn { display: inline-block; padding: 14px 32px; background: #1A3C8F; color: #ffffff !important; text-decoration: none; border-radius: 6px; font-size: 15px; font-weight: 600; margin: 8px 0 24px; }
        .btn:hover { background: #E63329; }
        .divider { height: 1px; background: #e8ecf0; margin: 24px 0; }
        .note { background: #f8f9fc; border-left: 4px solid #1A3C8F; padding: 14px 18px; border-radius: 0 6px 6px 0; font-size: 13px; color: #666; margin-bottom: 16px; }
        .footer { background: #f4f6f9; padding: 24px 40px; text-align: center; border-top: 1px solid #e8ecf0; }
        .footer p { font-size: 12px; color: #999; line-height: 1.6; }
        .footer a { color: #1A3C8F; text-decoration: none; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="header">
        <h1>Silverline IT</h1>
        <p>Career Exploration Center</p>
    </div>
    <div class="body">
        <th:block th:replace="${content}" />
    </div>
    <div class="footer">
        <p>© 2025 Silverline IT Career Exploration Center. All rights reserved.</p>
        <p style="margin-top:6px;">
            If you did not create an account, please ignore this email or
            <a href="#">contact support</a>.
        </p>
    </div>
</div>
</body>
</html>
