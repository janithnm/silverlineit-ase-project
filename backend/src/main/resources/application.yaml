spring:
  application:
    name: coursecontentsystem

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/course_content_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:sQLPasswordekaMySQL9713*_N22*_}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:dev.janithonline@gmail.com}
    password: ${MAIL_PASSWORD:rejzzyiutfcecadi}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: false

  servlet:
    multipart:
      enabled: true
      max-file-size: ${MAX_FILE_SIZE:100MB}
      max-request-size: ${MAX_REQUEST_SIZE:105MB}

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

  jwt:
    secret: ${JWT_SECRET:cHJvc2NhbmdUU2VjcmV0S2V5Rm9yTG9jYWxEZXZlbG9wbWVudE9ubHlEb05vdFVzZUluUHJvZHVjdGlvbjIwMjU=}
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}

  storage:
    provider: ${STORAGE_PROVIDER:local}
    local:
      upload-dir: ${LOCAL_UPLOAD_DIR:./uploads}
    s3:
      bucket: ${S3_BUCKET:}
      region: ${AWS_REGION:}
      access-key: ${AWS_ACCESS_KEY:}
      secret-key: ${AWS_SECRET_KEY:}

  upload:
    max-file-size-bytes: ${MAX_FILE_SIZE_BYTES:104857600}
    allowed-types: pdf,mp4,jpg,jpeg,png

  mail:
    from-name: ${MAIL_FROM_NAME:Silverline IT}
    from-address: ${MAIL_FROM_ADDRESS}

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-stacktrace: never